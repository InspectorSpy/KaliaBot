services:
  server:
    build:
      context: .
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped
  dashboard:
    build:
      context: ./dashboard
    volumes:
      - ./data:/app/data
      - /var/run/docker.sock:/var/run/docker.sock
    ports:
      - "3000:3000"
    restart: unless-stopped
